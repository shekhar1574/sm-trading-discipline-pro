name: sm_trading_discipline_pro
description: "SM Trading Discipline Pro - Discipline First. Profits Follow."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage for API keys / auth tokens (Phase 2 broker integration)
  flutter_secure_storage: ^9.2.2

  # Charts for analytics dashboard
  fl_chart: ^0.68.0

  # Image picking for trade screenshots
  image_picker: ^1.1.2

  # Local notifications (cooldown timer / discipline nudges)
  flutter_local_notifications: ^17.2.2

  # Date formatting
  intl: ^0.19.0

  # Premium fonts for the dashboard look
  google_fonts: ^6.2.1

  # Opens broker OAuth login pages in the device browser
  url_launcher: ^6.3.1

  # Networking - calls our FastAPI backend for broker OAuth/live P&L
  http: ^1.2.2

  # Reports export (Excel + PDF)
  excel: ^4.0.6
  pdf: ^3.11.1
  printing: ^5.13.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
