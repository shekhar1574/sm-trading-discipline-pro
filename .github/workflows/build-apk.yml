name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (required by Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold native Android project if missing
        run: |
          if [ ! -d "android" ]; then
            echo "No android/ folder found — generating one."
            flutter create --org com.smtrading --project-name sm_trading_discipline_pro --platforms android .
          fi

      - name: Ensure compileSdk 35 in generated Android project
        run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sm-trading-discipline-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
