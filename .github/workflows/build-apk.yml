name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (required by Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: false

      - name: Scaffold native Android project if missing
        run: |
          if [ ! -d "android" ]; then
            echo "No android/ folder found — generating one."
            flutter create --org com.smtrading --project-name sm_trading_discipline_pro --platforms android .
          fi

      - name: Patch generated Android project (compileSdk 36 + desugaring)
        run: |
          python3 << 'PYEOF'
          import re

          path = "android/app/build.gradle.kts"
          with open(path) as f:
              content = f.read()

          content = re.sub(
              r'compileSdk\s*=\s*flutter\.compileSdkVersion',
              'compileSdk = 36',
              content,
          )
          content = re.sub(
              r'compileSdk\s*=\s*\d+',
              'compileSdk = 36',
              content,
          )

          if 'isCoreLibraryDesugaringEnabled' not in content:
              content = re.sub(
                  r'(compileOptions\s*\{)',
                  r'\1\n        isCoreLibraryDesugaringEnabled = true',
                  content,
                  count=1,
              )

          content += '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'

          with open(path, "w") as f:
              f.write(content)

          print("Patched build.gradle.kts:")
          print(content)
          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sm-trading-discipline-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
